function parseCSV(text) {
  const [header, ...rows] = text.trim().split('\n');
  const cols = header.split(',').slice(2);
  const data = {};
  cols.forEach(c => data[c] = []);

    const vals = row.split(',');

      const v = parseFloat(vals[i + 2]);
      if (!isNaN(v)) data[c].push(v);
    });
  });
  return data;
}

}
